name: Postman Collection workflow

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 08 * * *'
    - cron: '00 18 * * *'
    - cron: '00 12 * * 1-5'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-postman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v6

      - name: Install node.js and npm
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install newman and htmlextra globally
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run the Postman Collection from Newman
        run: |
          newman run "InWarrantyFlow TestData.postman_collection.json" \
          -e "QA.postman_environment.json" \
          -d "TestData.csv" \
          -r cli,htmlextra

      - name: Upload Newman Report
        uses: actions/upload-artifact@v4
        if: always() # This ensures the report is saved even if tests fail
        with:
          name: Newman-Report
          path: newman/*.html
